<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
	<<button class="menu-toggle d-md-none" id="menuBtn">
        <i class="fas fa-bars"></i>
    </button>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-brand"><img src="image/jambi.png" alt="Logo Kota Jambi"><h3><i class="fas fa-home"></i> RTdigital</h3></div>
        <div class="sidebar-menu">
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="kependudukan.html"><i class="fas fa-users"></i> Kependudukan</a>
            <a href="keuangan.html"><i class="fas fa-wallet"></i> Keuangan</a>
            <a href="inventaris.html"><i class="fas fa-boxes"></i> Inventaris</a>
            <a href="kegiatan.html" class="active"><i class="fas fa-calendar-alt"></i> Kegiatan & Info</a>
            <a href="pengaturan.html"><i class="fas fa-cog"></i> Pengaturan</a>
			<a href="about.html"><i class="fas fa-info-circle"></i> Tentang</a>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Keluar</a>
        </div>
    </nav>
    <main class="main-content">
        <h3>Kegiatan & Informasi</h3>
        <ul class="nav nav-tabs mb-3" id="infoTab">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#pengumuman">Pengumuman</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#kegiatan">Kegiatan</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#surat">Permohonan Surat</button></li>
        </ul>
        <div class="tab-content">
            <div class="tab-pane fade show active" id="pengumuman">
                <div class="card"><div class="card-header">Buat Pengumuman</div><div class="card-body">
                    <form id="formPengumuman">
                        <div class="mb-2"><input type="text" class="form-control" id="judulPengumuman" placeholder="Judul" required></div>
                        <div class="mb-2"><textarea class="form-control" id="isiPengumuman" rows="3" placeholder="Isi pengumuman" required></textarea></div>
                        <button type="submit" class="btn btn-primary">Publikasikan</button>
                    </form>
                </div></div>
                <div id="daftarPengumuman" class="mt-3"></div>
            </div>
            <div class="tab-pane fade" id="kegiatan">
                <div class="card"><div class="card-header">Tambah Kegiatan</div><div class="card-body">
                    <form id="formKegiatan">
                        <div class="row">
                            <div class="col-md-6 mb-2"><input type="text" class="form-control" id="namaKegiatan" placeholder="Nama Kegiatan" required></div>
                            <div class="col-md-6 mb-2"><input type="date" class="form-control" id="tglKegiatan" required></div>
                        </div>
                        <div class="mb-2"><input type="text" class="form-control" id="lokasiKegiatan" placeholder="Lokasi"></div>
                        <div class="mb-2"><textarea class="form-control" id="deskKegiatan" rows="2" placeholder="Deskripsi"></textarea></div>
                        <button type="submit" class="btn btn-primary">Simpan</button>
                    </form>
                </div></div>
                <div id="daftarKegiatan" class="mt-3"></div>
            </div>
            <div class="tab-pane fade" id="surat">
                <div class="card"><div class="card-header">Ajukan Surat</div><div class="card-body">
                    <form id="formSurat">
                        <div class="row">
                            <div class="col-md-6 mb-2"><input type="text" class="form-control" id="namaPemohon" placeholder="Nama" required></div>
                            <div class="col-md-6 mb-2"><input type="text" class="form-control" id="nikPemohon" placeholder="NIK" required></div>
                        </div>
                        <div class="mb-2"><select class="form-select" id="jenisSurat" required><option value="">Pilih Jenis</option><option>Domisili</option><option>Usaha</option><option>Pengantar KTP/KK</option><option>Tidak Mampu</option></select></div>
                        <div class="mb-2"><textarea class="form-control" id="keperluanSurat" rows="2" placeholder="Keperluan" required></textarea></div>
                        <button type="submit" class="btn btn-primary">Ajukan</button>
                    </form>
                </div></div>
                <div class="card mt-3"><div class="card-header">Riwayat Permohonan</div><div class="card-body table-responsive"><table class="table"><thead><tr><th>Tgl</th><th>Nama</th><th>Jenis</th><th>Status</th></tr></thead><tbody id="tabelSurat"></tbody></table></div></div>
            </div>
        </div>
        <div class="copyright">© 2026 LABABIL SOLUTION | 08997499994 / 08139899985</div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/kegiatan.js"></script>
	<script>
    document.addEventListener('DOMContentLoaded', function() {
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        
        if (menuBtn && sidebar) {
            console.log('Tombol sidebar ditemukan! Siap diklik.');
            
            menuBtn.addEventListener('click', function() {
                console.log('TOMBOL DIKLIK!'); // Cek di Console
                sidebar.classList.toggle('open');
            });
            
            // Tutup sidebar jika klik di luar
            document.addEventListener('click', function(e) {
                if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
                    sidebar.classList.remove('open');
                }
            });
        } else {
            console.error('GAGAL: Tombol atau Sidebar tidak ditemukan! Cek ID HTML.');
        }
    });
	</script>
</body>
</html>
