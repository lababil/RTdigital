<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1abc9c">
    <title>Login - RTdigital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card mb-4">
            <div class="login-brand">
                <img src="image/kb.png" alt="Logo KB" onerror="this.src='https://via.placeholder.com/90'">
                <h2 class="fw-bold">RTdigital</h2>
                <p class="mb-0 opacity-75">Sistem Manajemen RT Digital</p>
            </div>
            <div class="login-form">
                <ul class="nav nav-tabs" id="authTab">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">Login</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#register">Daftar</button>
                    </li>
                </ul>
                <div class="tab-content mt-4">
                    <div class="tab-pane fade show active" id="login">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">Email</label>
                                <input type="email" class="form-control" id="loginEmail" placeholder="Masukkan email" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">Password</label>
                                <input type="password" class="form-control" id="loginPassword" placeholder="Masukkan password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100" id="btnLogin">Masuk</button>
                        </form>
                    </div>
                    <div class="tab-pane fade" id="register">
                        <form id="registerForm">
                            <div class="row">
                                <div class="col-sm-6 mb-3">
                                    <label class="form-label text-muted small fw-bold">NIK</label>
                                    <input type="text" class="form-control" id="regNIK" required>
                                </div>
                                <div class="col-sm-6 mb-3">
                                    <label class="form-label text-muted small fw-bold">Nama Lengkap</label>
                                    <input type="text" class="form-control" id="regNama" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">Email</label>
                                <input type="email" class="form-control" id="regEmail" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">No. Rumah</label>
                                <input type="text" class="form-control" id="regRumah" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">Password</label>
                                <input type="password" class="form-control" id="regPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100" id="btnRegister">Daftar Akun</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="social-links">
            <a href="https://wa.me/628997499994" target="_blank" class="social-btn whatsapp">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
            <a href="https://youtube.com/@l4b4bil?si=zAxHG1DSH2ZFpW9v" target="_blank" class="social-btn youtube">
                <i class="fab fa-youtube"></i> YouTube
            </a>
        </div>

        <div class="copyright">
            <p class="mb-1 fw-bold text-dark">LABABIL SOLUTION</p>
            <p class="mb-0"><i class="fas fa-phone me-2"></i>08997499994 / 08139899985</p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { registerWarga, loginUser, onAuthChange } from './js/auth.js';
        onAuthChange(u => { if(u.isLoggedIn) window.location.href = 'dashboard.html'; });
        document.getElementById('registerForm').addEventListener('submit', async e => {
            e.preventDefault(); const btn = document.getElementById('btnRegister'); btn.disabled = true; btn.textContent = 'Memproses...';
            const res = await registerWarga(document.getElementById('regEmail').value, document.getElementById('regPassword').value, {
                nama: document.getElementById('regNama').value, nik: document.getElementById('regNIK').value, noRumah: document.getElementById('regRumah').value
            });
            if(res.success) { alert(res.message); document.querySelector('[data-bs-target="#login"]').click(); e.target.reset(); }
            else alert(res.error);
            btn.disabled = false; btn.textContent = 'Daftar Akun';
        });
        document.getElementById('loginForm').addEventListener('submit', async e => {
            e.preventDefault(); const btn = document.getElementById('btnLogin'); btn.disabled = true; btn.textContent = 'Memproses...';
            const res = await loginUser(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
            if(res.success) window.location.href = 'dashboard.html';
            else alert(res.error);
            btn.disabled = false; btn.textContent = 'Masuk';
        });
    </script>
</body>
</html>
